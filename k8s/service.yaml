apiVersion: v1
kind: Service
metadata:
  name: onlineportfolio-service
spec:
  type: NodePort
  selector:
    app: onlineportfolio                  # Must match the Deployment's matchLabels exactly
  ports:
    - name: app
      port: 8081                          # Internal cluster access port
      targetPort: 8081                    # Port inside your container
      nodePort: 30082                     # Access your app in the browser at http://localhost:30081, clash happend so changed to 30082